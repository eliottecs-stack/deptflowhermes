# Configuration Hermes pour un profil SDR IA LinkedIn

agent:
  llm:
    provider: openai
    model: gpt-5.5
    temperature: 0.7
  timezone: "${TIMEZONE}"
  max_turns: 50
  memory:
    type: redis
    url: redis://localhost:6379/0

# Déclaration des skills/plugins utilisés
skills:
  # Recherche de prospects via l'API BeReach
  - bereach_search
  - bereach_profile

  # Scoring des leads
  - lead_scoring

  # CRM Supabase
  - supabase_crm

  # Envoi de demandes de connexion LinkedIn
  - connection_request

  # Sous‑agent de contrôle qualité
  - qa_control

  # Rapport quotidien des performances
  - daily_report

# Limites par défaut (remplacées via .env)
limits:
  max_connections_per_week: ${MAX_CONNECTIONS_PER_WEEK}
  max_messages_per_day: ${MAX_MESSAGES_PER_DAY}

# Seuil de score à partir duquel un lead est qualifié
lead_score_threshold: ${LEAD_SCORE_THRESHOLD}

# Configuration du CRM Supabase
crm:
  provider: supabase
  url: "${SUPABASE_URL}"
  api_key: "${SUPABASE_ANON_KEY}"
  leads_table: leads
